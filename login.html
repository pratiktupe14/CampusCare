<script>
        function selectRole(element) {
            // Remove active classes from all cards
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('border-primary', 'bg-primary/5', 'ring-1', 'ring-primary');
                card.querySelector('.material-symbols-outlined').classList.replace('text-primary', 'text-on-surface-variant');
            });
            
            // Add active classes to selected
            element.classList.add('border-primary', 'bg-primary/5', 'ring-1', 'ring-primary');
            element.querySelector('.material-symbols-outlined').classList.replace('text-on-surface-variant', 'text-primary');
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('password-toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Initialize first role as default
        window.onload = () => {
            selectRole(document.querySelector('.role-card'));
        };
    </script>
